<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VM 2026 Tipp</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    .section {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
    }

    h2 {
      margin-top: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      background: #334155;
    }

    tr:hover {
      background: #273549;
    }
  </style>
</head>

<body>

  <h1>🏆 VM 2026 Tipp</h1>

  <div class="section">
    <h2>🔥 Leaderboard</h2>
    <table id="leaderboard-table"></table>
  </div>

  <div class="section">
    <h2>⚽ Matcher</h2>
    <table id="matches-table"></table>
  </div>

  <div class="section">
    <h2>📝 Tips</h2>
    <table id="tips-table"></table>
  </div>

  <div class="section">
    <h2>👤 Visa tips per person</h2>
  
    <div id="player-buttons"></div>
  
    <br>
  
    <table id="player-tips-table"></table>
  </div>

<script>

const leaderboardCSV =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQbu-x0A3E3xaDuKiZHAIjTDcV-XsDkpQJ3NuX9Qg8FGLfRhu6bC_0qYwOeKpaToA/pub?gid=797355487&single=true&output=csv";

const matchesCSV =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQbu-x0A3E3xaDuKiZHAIjTDcV-XsDkpQJ3NuX9Qg8FGLfRhu6bC_0qYwOeKpaToA/pub?gid=690767260&single=true&output=csv";

const tipsCSV =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQbu-x0A3E3xaDuKiZHAIjTDcV-XsDkpQJ3NuX9Qg8FGLfRhu6bC_0qYwOeKpaToA/pub?gid=114534825&single=true&output=csv";

const playersCSV =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQbu-x0A3E3xaDuKiZHAIjTDcV-XsDkpQJ3NuX9Qg8FGLfRhu6bC_0qYwOeKpaToA/pub?gid=1596992856&single=true&output=csv";
  
async function loadCSV(url) {
  const response = await fetch(url);
  const data = await response.text();
  return data.split("\n").map(row => row.split(","));
}

//leaderborden
async function loadLeaderboard() {
  const rows = await loadCSV(leaderboardCSV);

  let html = "";

  rows.forEach((row, index) => {
    html += "<tr>";

    row.forEach(cell => {
      if(index === 0){
        html += `<th>${cell}</th>`;
      } else {
        html += `<td>${cell}</td>`;
      }
    });

    html += "</tr>";
  });

  document.getElementById("leaderboard-table").innerHTML = html;
}

//matcher
async function loadMatches() {
  const rows = await loadCSV(matchesCSV);

  let html = "";

  rows.forEach((row, index) => {
    html += "<tr>";

    row.forEach(cell => {
      if(index === 0){
        html += `<th>${cell}</th>`;
      } else {
        html += `<td>${cell}</td>`;
      }
    });

    html += "</tr>";
  });

  document.getElementById("matches-table").innerHTML = html;
}

//tipsen
async function loadTips() {
  const rows = await loadCSV(tipsCSV);

  let html = "";

  rows.forEach((row, index) => {
    html += "<tr>";

    row.forEach(cell => {
      if(index === 0){
        html += `<th>${cell}</th>`;
      } else {
        html += `<td>${cell}</td>`;
      }
    });

    html += "</tr>";
  });

  document.getElementById("tips-table").innerHTML = html;
}

let allTips = [];

async function loadPlayerButtons() {

  const playerRows = await loadCSV(playersCSV);
  const tipsRows = await loadCSV(tipsCSV);

  allTips = tipsRows;

  let buttonsHTML = "";

  playerRows.slice(1).forEach(row => {

    const playerName = row[0];

    if(playerName){

      buttonsHTML += `
        <button onclick="showPlayerTips('${playerName}')"
        style="
          margin:5px;
          padding:10px 15px;
          border:none;
          border-radius:8px;
          background:#3b82f6;
          color:white;
          cursor:pointer;
        ">
          ${playerName}
        </button>
      `;
    }

  });

  document.getElementById("player-buttons").innerHTML = buttonsHTML;
}

function showPlayerTips(playerName){

  let html = `
    <tr>
      <th>Namn</th>
      <th>Match ID</th>
      <th>Tipp A</th>
      <th>Tipp B</th>
      <th>Poäng</th>
    </tr>
  `;

  allTips.slice(1).forEach(row => {

    if(row[0] === playerName){

      html += "<tr>";

      row.forEach((cell,index) => {

        if(index <= 4){
          html += `<td>${cell}</td>`;
        }

      });

      html += "</tr>";
    }

  });

  document.getElementById("player-tips-table").innerHTML = html;
}
  
loadLeaderboard();
loadMatches();
loadTips();
loadPlayerButtons();
  
</script>

</body>
</html>
